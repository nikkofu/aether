# Aether 示例配置文件

app:
  mode: "single" # single, cluster-leader, cluster-worker
  node_id: "node-1"
  role: "general"

agent:
  max_spawn_per_task: 5
  max_concurrency: 20

runtime:
  database_path: "./aether.db"
  # nats_url: "nats://localhost:4222" # 分布式模式需要

# 本地 LLM (默认优先)
ollama:
  base_url: "http://localhost:11434"
  model: "qwen3.5:0.8b"
  temperature: 0.7
  timeout: 300s

# 可选：OpenAI
# openai:
#   api_key: "sk-..."
#   model: "gpt-4o"
#   temperature: 0.7

log:
  level: "info"
