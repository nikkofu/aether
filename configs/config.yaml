app:
  name: "aether-enterprise"
  mode: "single"
  role: "supervisor"

log:
  level: "info"

runtime:
  nats_url: ""
  database_path: "./aether.db"

agent:
  max_spawn_per_task: 10
  max_concurrency: 50

ollama:
  base_url: "http://localhost:11434"
  model: "qwen3.5:0.8b" # 精准匹配本地模型
  temperature: 0.7
  timeout: "600s"

openai:
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  temperature: 0.7
  timeout: "120s"
